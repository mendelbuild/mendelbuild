{{define "page-content"}}
<h1>MendelBuild Dashboard</h1>

<div class="card">
    <h2>Projects</h2>
    {{if .Projects}}
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Projects}}
            <tr>
                <td>{{.Name}}</td>
                <td>{{.CreatedAt.Format "2006-01-02 15:04"}}</td>
                <td>
                    <a href="/p/{{.ID}}/strategy">View Strategy</a>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
    {{else}}
    <p class="empty">No projects yet. Use <code>mendel load-strategy &lt;file.json&gt;</code> to create one.</p>
    {{end}}
</div>
{{end}}
